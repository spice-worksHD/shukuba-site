<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHUKUBA | 管理画面</title>
<style>
  :root {
    --ink: #1d3a3f;
    --paper: #eef5f2;
    --warm: #5a93a8;
    --gold: #4f9a8e;
    --dark: #143a42;
    --muted: #5e767d;
    --border: #cfe0db;
    --green: #7fae8e;
    --danger: #c0594a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;
    background: var(--paper); color: var(--ink);
    padding: 24px; min-height: 100vh;
  }
  h1 { font-size: 22px; letter-spacing: 2px; margin-bottom: 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

  /* Login gate */
  #login-screen {
    max-width: 360px; margin: 80px auto; background: #fff; border: 1px solid var(--border);
    border-radius: 8px; padding: 32px; text-align: center;
  }
  #login-screen h2 { font-size: 18px; margin-bottom: 16px; }
  #login-screen input {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 4px;
    font-size: 14px; margin-bottom: 12px;
  }
  #login-screen button, .btn {
    background: var(--gold); color: #fff; border: none; border-radius: 4px;
    padding: 10px 18px; font-size: 14px; cursor: pointer; transition: background .2s;
  }
  #login-screen button:hover, .btn:hover { background: var(--dark); }
  #login-error { color: var(--danger); font-size: 12px; margin-top: 8px; min-height: 16px; }

  /* App */
  #app { display: none; max-width: 1000px; margin: 0 auto; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .tab-btn {
    padding: 10px 18px; cursor: pointer; border: none; background: none; font-size: 14px;
    color: var(--muted); border-bottom: 2px solid transparent; transition: all .2s;
  }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); font-weight: bold; }
  .panel { display: none; }
  .panel.active { display: block; }

  .card { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .card h3 { font-size: 15px; margin-bottom: 14px; letter-spacing: 1px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { color: var(--muted); font-weight: normal; font-size: 12px; }
  tr:last-child td { border-bottom: none; }

  .stats-grid { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .stat-box { flex: 1; min-width: 140px; background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .stat-box .label { font-size: 12px; color: var(--muted); }
  .stat-box .value { font-size: 22px; font-weight: bold; margin-top: 4px; color: var(--dark); }

  .room-row { display: grid; grid-template-columns: 220px 140px 1fr; gap: 12px; align-items: start; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .room-row:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
  .room-row label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .room-row input[type=number], .room-row input[type=date] {
    width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px;
  }
  .override-list { display: flex; flex-direction: column; gap: 6px; }
  .override-item { display: flex; align-items: center; gap: 8px; font-size: 12px; background: var(--paper); padding: 4px 8px; border-radius: 4px; }
  .override-item .x { cursor: pointer; color: var(--danger); font-weight: bold; margin-left: auto; }
  .add-override { display: flex; gap: 6px; margin-top: 8px; }
  .add-override input { padding: 6px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; }
  .add-override input[type=date] { flex: 1; }
  .add-override input[type=number] { width: 100px; }
  .small-btn { background: var(--green); color: #fff; border: none; border-radius: 4px; padding: 6px 10px; font-size: 12px; cursor: pointer; }
  .small-btn:hover { background: var(--gold); }
  .danger-btn { background: var(--danger); }
  .danger-btn:hover { background: #a3463a; }
  .save-row { text-align: right; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
  .badge.future { background: #e2f0ec; color: var(--gold); }
  .badge.past { background: #eee; color: var(--muted); }
  .msg { font-size: 12px; color: var(--gold); margin-top: 8px; min-height: 16px; }

  /* Calendar grid */
  .cal-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .grid-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 6px; max-height: 70vh; }
  .grid-table { border-collapse: collapse; font-size: 12px; white-space: nowrap; }
  .grid-table th, .grid-table td { border: 1px solid var(--border); padding: 6px 8px; text-align: center; }
  .grid-table thead th { background: var(--paper); position: sticky; top: 0; z-index: 2; font-weight: normal; color: var(--muted); }
  .sticky-col { position: sticky; left: 0; background: #fff; z-index: 3; min-width: 210px; text-align: left; vertical-align: middle; }
  .sticky-col2 { position: sticky; left: 210px; background: #fff; z-index: 3; min-width: 52px; color: var(--muted); font-size: 11px; }
  thead .sticky-col, thead .sticky-col2 { z-index: 4; }
  .weekend-col { background: #fdf0ee; }
  .cell-status { cursor: pointer; font-size: 11px; }
  .cell-status.open { background: #fff; color: var(--green); }
  .cell-status.blocked { background: #fbe6e1; color: var(--danger); font-weight: bold; }
  .cell-status.booked { background: #e9ebed; color: var(--muted); cursor: default; }
  .price-input { width: 64px; border: 1px solid transparent; background: transparent; text-align: center; font-size: 12px; border-radius: 4px; padding: 4px; }
  .price-input:hover, .price-input:focus { border-color: var(--gold); background: #fff; outline: none; }
  .base-input { border: 1px solid var(--border); border-radius: 4px; padding: 2px 4px; font-size: 11px; width: 70px; }
</style>
</head>
<body>

<div id="login-screen">
  <h2>SHUKUBA 管理画面</h2>
  <input type="password" id="login-key" placeholder="管理パスワード">
  <button onclick="login()">ログイン</button>
  <div id="login-error"></div>
</div>

<div id="app">
  <h1>SHUKUBA 管理画面</h1>
  <div class="sub">予約管理・料金設定・在庫管理</div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('reservations')">予約履歴・サマリー</button>
    <button class="tab-btn" onclick="showTab('calendar')">料金・在庫カレンダー</button>
  </div>

  <!-- Reservations -->
  <div class="panel active" id="panel-reservations">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="card">
      <h3>予約一覧</h3>
      <table id="bookings-table">
        <thead>
          <tr>
            <th>予約日時</th><th>物件</th><th>チェックイン</th><th>チェックアウト</th>
            <th>人数</th><th>氏名</th><th>連絡先</th><th>金額</th><th>状態</th><th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- Calendar (pricing + inventory) -->
  <div class="panel" id="panel-calendar">
    <div class="card">
      <h3>料金・在庫カレンダー</h3>
      <div class="cal-toolbar">
        <button class="small-btn" onclick="shiftCalRange(-7)">← 前の週</button>
        <button class="small-btn" onclick="todayCalRange()">今日</button>
        <button class="small-btn" onclick="shiftCalRange(7)">次の週 →</button>
        <span id="cal-range-label" style="margin-left:12px;color:var(--muted);font-size:13px"></span>
        <span id="grid-msg" class="msg" style="margin-left:auto;margin-top:0"></span>
      </div>
      <div class="grid-wrap">
        <table class="grid-table" id="grid-table"></table>
      </div>
      <p style="font-size:12px;color:var(--muted);margin-top:10px">
        ・「販売中」をクリックすると「売止」に切り替わります（再クリックで解除）。<br>
        ・「予約済」は実際の予約が入っている日で、ここから直接は変更できません（取消は「予約履歴・サマリー」タブから）。<br>
        ・料金欄に数値を入力するとその日だけの特別料金になります。空欄にすると基本料金に戻ります。
      </p>
    </div>
  </div>
</div>

<script>
const roomLabels = {
  '0': '近江八幡・鍵之手町',
  '1': '近江八幡・為心町',
  '2': '長浜・元浜町',
};

let adminKey = localStorage.getItem('shukuba_admin_key') || '';
let state = { bookings: [], pricing: {}, blocked: {} };

async function login() {
  const key = document.getElementById('login-key').value.trim();
  if (!key) return;
  const res = await fetch('/.netlify/functions/admin', { headers: { 'x-admin-key': key } });
  if (res.ok) {
    adminKey = key;
    localStorage.setItem('shukuba_admin_key', key);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    state = await res.json();
    renderAll();
  } else {
    document.getElementById('login-error').textContent = 'パスワードが正しくありません。';
  }
}

async function init() {
  if (!adminKey) return;
  const res = await fetch('/.netlify/functions/admin', { headers: { 'x-admin-key': adminKey } });
  if (res.ok) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    state = await res.json();
    renderAll();
  }
}

async function apiPost(body) {
  const res = await fetch('/.netlify/functions/admin', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
    body: JSON.stringify(body),
  });
  return res.json();
}

function showTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab-btn[onclick="showTab('${name}')"]`).classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

function renderAll() {
  renderStats();
  renderBookings();
  renderGrid();
}

// ===== RESERVATIONS =====
function renderStats() {
  const today = new Date(); today.setHours(0,0,0,0);
  const total = state.bookings.length;
  const upcoming = state.bookings.filter(b => new Date(b.checkin) >= today).length;
  const revenue = state.bookings.reduce((sum, b) => sum + (b.total || 0), 0);
  const upcomingRevenue = state.bookings.filter(b => new Date(b.checkin) >= today)
    .reduce((sum, b) => sum + (b.total || 0), 0);

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-box"><div class="label">総予約数</div><div class="value">${total}件</div></div>
    <div class="stat-box"><div class="label">今後の予約</div><div class="value">${upcoming}件</div></div>
    <div class="stat-box"><div class="label">合計売上（全期間）</div><div class="value">¥${revenue.toLocaleString()}</div></div>
    <div class="stat-box"><div class="label">今後の売上予定</div><div class="value">¥${upcomingRevenue.toLocaleString()}</div></div>
  `;
}

function renderBookings() {
  const today = new Date(); today.setHours(0,0,0,0);
  const tbody = document.querySelector('#bookings-table tbody');
  const sorted = state.bookings.map((b, i) => ({...b, _idx: i}))
    .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  tbody.innerHTML = sorted.map(b => {
    const isFuture = new Date(b.checkin) >= today;
    return `<tr>
      <td>${new Date(b.createdAt).toLocaleString('ja-JP')}</td>
      <td>${roomLabels[String(b.room)] || b.roomName || b.room}</td>
      <td>${b.checkin}</td>
      <td>${b.checkout}</td>
      <td>${b.guests || '-'}</td>
      <td>${b.name}</td>
      <td>${b.email}<br>${b.phone || ''}</td>
      <td>¥${(b.total || 0).toLocaleString()}</td>
      <td><span class="badge ${isFuture ? 'future' : 'past'}">${isFuture ? '予定' : '完了'}</span></td>
      <td><button class="small-btn danger-btn" onclick="cancelBooking(${b._idx})">取消</button></td>
    </tr>`;
  }).join('') || '<tr><td colspan="10" style="color:var(--muted)">予約はまだありません</td></tr>';
}

async function cancelBooking(idx) {
  if (!confirm('この予約を取り消しますか？日程は再度予約可能になります。')) return;
  const r = await apiPost({ action: 'cancel-booking', index: idx });
  if (r.ok) { state.bookings = r.bookings; renderStats(); renderBookings(); renderGrid(); }
}

// ===== PRICING + INVENTORY CALENDAR GRID =====
let calRangeStart = (() => { const d = new Date(); d.setHours(0,0,0,0); return d; })();
const CAL_DAYS = 21;

function fmtDateAdmin(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtDisp(d) { return (d.getMonth()+1) + '/' + d.getDate(); }

function shiftCalRange(days) {
  calRangeStart.setDate(calRangeStart.getDate() + days);
  renderGrid();
}
function todayCalRange() {
  calRangeStart = new Date(); calRangeStart.setHours(0,0,0,0);
  renderGrid();
}

function getBookedSet(room) {
  const set = new Set();
  state.bookings.forEach(b => {
    if (String(b.room) !== String(room)) return;
    let cur = new Date(b.checkin);
    const end = new Date(b.checkout);
    while (cur < end) { set.add(fmtDateAdmin(cur)); cur.setDate(cur.getDate()+1); }
  });
  return set;
}

function renderGrid() {
  const days = [];
  for (let i = 0; i < CAL_DAYS; i++) {
    const d = new Date(calRangeStart);
    d.setDate(d.getDate() + i);
    days.push(d);
  }
  document.getElementById('cal-range-label').textContent =
    `${fmtDisp(days[0])} 〜 ${fmtDisp(days[days.length - 1])}`;

  let html = '<thead><tr><th class="sticky-col">物件</th><th class="sticky-col2"></th>';
  days.forEach(d => {
    const dow = ['日','月','火','水','木','金','土'][d.getDay()];
    const cls = (d.getDay() === 0 || d.getDay() === 6) ? 'weekend-col' : '';
    html += `<th class="${cls}">${d.getMonth()+1}/${d.getDate()}<br><span style="font-size:10px">(${dow})</span></th>`;
  });
  html += '</tr></thead><tbody>';

  Object.keys(roomLabels).forEach(room => {
    const p = state.pricing[room] || { base: 0, overrides: {} };
    const bookedSet = getBookedSet(room);
    const blockedSet = new Set(state.blocked[room] || []);

    html += `<tr>
      <td class="sticky-col" rowspan="2">
        <strong>${roomLabels[room]}</strong>
        <div style="font-size:11px;color:var(--muted);margin-top:4px;line-height:1.8">
          基本料金 ¥<input type="number" class="base-input" value="${p.base || 0}" step="500" onchange="savePricingField('${room}','base',this.value)"><br>
          人数 <input type="number" class="base-input" style="width:40px" min="1" value="${p.minGuests ?? 1}" onchange="savePricingField('${room}','minGuests',this.value)">
          〜<input type="number" class="base-input" style="width:40px" min="1" value="${p.maxGuests ?? 10}" onchange="savePricingField('${room}','maxGuests',this.value)">名<br>
          超過1名+¥<input type="number" class="base-input" step="500" value="${p.extraGuestFee ?? 0}" onchange="savePricingField('${room}','extraGuestFee',this.value)">
        </div>
      </td>
      <td class="sticky-col2">状態</td>`;
    days.forEach(d => {
      const key = fmtDateAdmin(d);
      const cls = (d.getDay() === 0 || d.getDay() === 6) ? 'weekend-col' : '';
      if (bookedSet.has(key)) {
        html += `<td class="cell-status booked ${cls}">予約済</td>`;
      } else if (blockedSet.has(key)) {
        html += `<td class="cell-status blocked ${cls}" onclick="toggleBlocked('${room}','${key}')">売止</td>`;
      } else {
        html += `<td class="cell-status open ${cls}" onclick="toggleBlocked('${room}','${key}')">販売中</td>`;
      }
    });
    html += '</tr><tr><td class="sticky-col2">料金</td>';
    days.forEach(d => {
      const key = fmtDateAdmin(d);
      const cls = (d.getDay() === 0 || d.getDay() === 6) ? 'weekend-col' : '';
      const overrides = p.overrides || {};
      const val = overrides[key] != null ? overrides[key] : '';
      html += `<td class="${cls}"><input type="number" class="price-input" step="500" placeholder="${p.base || 0}" value="${val}" onchange="savePriceOverride('${room}','${key}', this.value)"></td>`;
    });
    html += '</tr>';
  });

  html += '</tbody>';
  document.getElementById('grid-table').innerHTML = html;
}

function flashMsg(text) {
  const el = document.getElementById('grid-msg');
  el.textContent = text;
  setTimeout(() => { if (el.textContent === text) el.textContent = ''; }, 2000);
}

async function savePricingField(room, field, value) {
  const p = state.pricing[room] || {};
  const payload = {
    action: 'set-pricing',
    room,
    base: field === 'base' ? Number(value) || 0 : (p.base || 0),
    overrides: p.overrides || {},
    minGuests: field === 'minGuests' ? Number(value) || 1 : (p.minGuests ?? 1),
    maxGuests: field === 'maxGuests' ? Number(value) || 1 : (p.maxGuests ?? 10),
    extraGuestFee: field === 'extraGuestFee' ? Number(value) || 0 : (p.extraGuestFee ?? 0),
  };
  const r = await apiPost(payload);
  if (r.ok) { state.pricing = r.pricing; renderGrid(); flashMsg('設定を更新しました'); }
}

async function savePriceOverride(room, date, value) {
  const p = state.pricing[room] || { base: 0, overrides: {} };
  const overrides = { ...(p.overrides || {}) };
  if (value === '' || value == null) {
    delete overrides[date];
  } else {
    overrides[date] = Number(value);
  }
  const r = await apiPost({ action: 'set-pricing', room, base: p.base, overrides });
  if (r.ok) { state.pricing = r.pricing; flashMsg('料金を更新しました'); }
}

async function toggleBlocked(room, date) {
  const set = new Set(state.blocked[room] || []);
  if (set.has(date)) set.delete(date); else set.add(date);
  const r = await apiPost({ action: 'set-blocked', room, dates: [...set] });
  if (r.ok) { state.blocked = r.blocked; renderGrid(); flashMsg('在庫状態を更新しました'); }
}

init();
</script>
</body>
</html>
