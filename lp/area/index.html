<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#16463F">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">

<body>
<div class="lp">

  <!-- Hero B（八幡堀の写真背景） -->
  <header class="lp-heroB" style="background-image:url('https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Omihachiman_Canal_March_2016.jpg/1280px-Omihachiman_Canal_March_2016.jpg')">
    <div class="ttl">スタッフが選ぶ<br>湖国の歩きかた</div>
    <div class="rule"></div>
    <div class="lead">まだ予定が決まっていない方も大丈夫。<br>近江八幡・長浜・琵琶湖の「行っておくべき場所」を集めました。</div>
  </header>

  <!-- カードグリッド索引 -->
  <div class="lp-sec"><span class="en">AREA GUIDE</span>エリアから選ぶ</div>
  <div class="lp-grid">
    <a class="lp-card" href="/lp/spots/#hachimanbori" style="background-image:url('https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Omihachiman_Canal_March_2016.jpg/1280px-Omihachiman_Canal_March_2016.jpg')">
      <span class="tag"><small>OMIHACHIMAN</small>#八幡堀と近江商人の町</span>
    </a>
    <a class="lp-card" href="/lp/spots/#kurokabe" style="background-image:url('https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/211021_Kurokabe_Square_Nagahama_Shiga_prefecture_Japan01s3.jpg/1280px-211021_Kurokabe_Square_Nagahama_Shiga_prefecture_Japan01s3.jpg')">
      <span class="tag"><small>NAGAHAMA</small>#黒壁スクエア</span>
    </a>
    <a class="lp-card" href="/lp/spots/#metasequoia" style="background-image:url('https://upload.wikimedia.org/wikipedia/commons/thumb/f/f1/Metasequoia_Road_in_Makino%2C_Takashima_-_Jul_9%2C_2017.jpg/1280px-Metasequoia_Road_in_Makino%2C_Takashima_-_Jul_9%2C_2017.jpg')">
      <span class="tag"><small>TAKASHIMA</small>#メタセコイア並木</span>
    </a>
    <a class="lp-card" href="/lp/spots/#shirahige" style="background-image:url('https://upload.wikimedia.org/wikipedia/commons/c/cb/Shirahige_Shrine_%E7%99%BD%E9%AC%9A%E7%A5%9E%E7%A4%BE6_-_panoramio.jpg')">
      <span class="tag"><small>LAKE BIWA</small>#白鬚神社の湖中鳥居</span>
    </a>
  </div>

  <div class="lp-text" style="margin-top:20px">
    近江八幡・長浜の二棟はいずれも城下町の散策起点。琵琶湖をぐるりとドライブすれば、四季で表情を変える絶景に出会えます。
    <div class="lp-btn-wrap">
      <a class="lp-btn" href="/lp/spots/">見どころを詳しく見る →</a>
    </div>
  </div>

  <!-- Footer -->
  <footer class="lp-foot">
    <div class="name">SHUKUBA</div>
    <div class="addr">滋賀県 近江八幡・長浜<br>古民家一棟貸し宿</div>
    <a class="home" href="https://shukuba-shiga.com/">公式サイトへ</a>
  </footer>

</div>
